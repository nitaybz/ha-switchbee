name: Validate

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  hassfest:
    name: Validate with hassfest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run hassfest
        uses: home-assistant/actions/hassfest@master

  hacs:
    name: Validate with HACS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run HACS validation
        uses: hacs/action@main
        with:
          category: integration

  # On tag pushes (e.g. v0.1.3), confirm the tag matches the version declared
  # in manifest.json and pyproject.toml. HACS strict-validates the manifest
  # version against the release tag; a mismatch causes HACS to silently skip
  # the release in users' instances.
  tag-version-match:
    name: Tag matches manifest.json + pyproject.toml
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify versions match the tag
        run: |
          set -e
          tag="${GITHUB_REF##refs/tags/v}"
          manifest_version=$(jq -r '.version' custom_components/ha_switchbee/manifest.json)
          pyproject_version=$(grep -m1 '^version' pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')
          echo "Tag: $tag"
          echo "manifest.json version: $manifest_version"
          echo "pyproject.toml version: $pyproject_version"
          if [ "$manifest_version" != "$tag" ]; then
            echo "::error::manifest.json version ($manifest_version) does not match tag ($tag)"
            exit 1
          fi
          if [ "$pyproject_version" != "$tag" ]; then
            echo "::error::pyproject.toml version ($pyproject_version) does not match tag ($tag)"
            exit 1
          fi
